<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>IFC Property Cleaner | Norconsult</title>
    <style>
        :root { --nc-green: #007a5e; }
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(rgba(0,122,94,0.8), rgba(0,122,94,0.8)), url('https://www.pbctoday.co.uk/news/wp-content/uploads/2023/03/iStock-452589487-scaled.jpg'); background-size: cover; }
        .box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 500px; }
        button { padding: 15px 30px; background: var(--nc-green); color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>IFC Property Cleaner</h2>
        <input type="file" id="file-input" accept=".ifc"><br><br>
        <button id="run-btn" onclick="runProcess()">Rensk og last ned</button>
        <div id="status">Velg fil</div>
    </div>

    <script type="module">
        import { IfcAPI } from 'https://cdn.jsdelivr.net/npm/web-ifc@0.0.44/web-ifc-api.js';
        
        window.runProcess = async function() {
            const fileInput = document.getElementById('file-input');
            const statusDiv = document.getElementById('status');
            const file = fileInput.files[0];
            const buffer = await file.arrayBuffer();
            const ifcApi = new IfcAPI();
            await ifcApi.Init();
            
            const modelID = ifcApi.OpenModel(new Uint8Array(buffer));
            
            // 1. Finn alle Psets
            const psets = ifcApi.GetLineIDsWithType(modelID, 855581566);
            
            // 2. Finn alle relasjoner som kobler Psets til objekter
            const rels = ifcApi.GetLineIDsWithType(modelID, 1284759685);

            for (let i = 0; i < rels.size(); i++) {
                const relID = rels.get(i);
                const rel = ifcApi.GetLine(modelID, relID);
                
                // Hent definisjonen (hvilket Pset er dette?)
                const propDef = rel.RelatingPropertyDefinition;
                const psetID = propDef.value;
                const pset = ifcApi.GetLine(modelID, psetID);
                
                // Sjekk navn
                const name = pset.Name ? pset.Name.value : "";
                
                // Hvis navnet IKKE starter med 0-7, slett BÅDE relasjonen og selve Psettet
                if (!/^[0-7]/.test(name)) {
                    ifcApi.RemoveLine(modelID, relID); // Slett koblingen
                    ifcApi.RemoveLine(modelID, psetID); // Slett selve gruppen
                }
            }

            statusDiv.innerText = "Lagrer...";
            const exportedData = ifcApi.SaveModel(modelID);
            const blob = new Blob([exportedData], { type: 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Renset_" + file.name;
            a.click();

            ifcApi.CloseModel(modelID);
            statusDiv.innerText = "Ferdig!";
        };
    </script>
</body>
</html>

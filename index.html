<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>IFC Property Cleaner</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
        .box { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; }
        #progress-container { width: 100%; background: #eee; height: 20px; border-radius: 10px; margin: 20px 0; display: none; }
        #progress-bar { width: 0%; height: 100%; background: #4caf50; border-radius: 10px; transition: width 0.3s; }
        #status { margin-top: 10px; color: #555; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2>IFC Property Cleaner</h2>
        <input type="file" id="file-input" accept=".ifc"><br><br>
        <button id="run-btn" onclick="runProcess()">Rensk og last ned</button>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="status">Velg en fil for å starte</div>
    </div>

    <!-- Vi importerer biblioteket som en modul -->
    <script type="module">
        import { IfcAPI } from 'https://cdn.jsdelivr.net/npm/web-ifc@0.0.40/web-ifc-api.js';
        
        window.runProcess = async function() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files.length) return alert("Velg en fil først!");

            const statusDiv = document.getElementById('status');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            
            progressContainer.style.display = 'block';
            statusDiv.innerText = "Laster inn IFC...";
            progressBar.style.width = "10%";

            const file = fileInput.files[0];
            const buffer = await file.arrayBuffer();
            const data = new Uint8Array(buffer);

            const ifcApi = new IfcAPI();
            // Sett stien til WASM-filen eksplisitt
            ifcApi.SetWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.40/");
            await ifcApi.Init();
            
            const modelID = ifcApi.OpenModel(data);
            
            statusDiv.innerText = "Rensker egenskaper...";
            progressBar.style.width = "40%";

            // Finn alle Psets
            const psets = ifcApi.GetLineIDsWithType(modelID, 855581566); // 855581566 er IFCPROPERTYSET sin ID
            const size = psets.size();

            for (let i = 0; i < size; i++) {
                const id = psets.get(i);
                const props = ifcApi.GetLine(modelID, id);
                const name = props.Name ? props.Name.value : "";

                // Regex for 1, 2, 3 eller 7
                if (!/^[1237]/.test(name)) {
                    ifcApi.RemoveLine(modelID, id);
                }
            }

            statusDiv.innerText = "Eksporterer...";
            progressBar.style.width = "80%";

            const exportedData = ifcApi.ExportFileAsIFC(modelID);
            const blob = new Blob([exportedData], { type: 'application/octet-stream' });
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "renset_" + file.name;
            a.click();

            ifcApi.CloseModel(modelID);
            statusDiv.innerText = "Ferdig!";
            progressBar.style.width = "100%";
        };
    </script>
</body>
</html>

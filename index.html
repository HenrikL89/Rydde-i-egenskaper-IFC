<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFC Property Cleaner | Norconsult</title>
    <style>
        :root { --nc-green: #007a5e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(rgba(0, 122, 94, 0.8), rgba(0, 122, 94, 0.8)), url('https://www.pbctoday.co.uk/news/wp-content/uploads/2023/03/iStock-452589487-scaled.jpg'); background-size: cover; background-position: center; }
        .box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: var(--nc-green); margin-top: 0; }
        #progress-container { width: 100%; background: #eee; height: 20px; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--nc-green); transition: width 0.4s ease; }
        #status { margin-top: 15px; font-weight: 600; color: #555; font-size: 0.9em; }
        button { padding: 12px 30px; background: var(--nc-green); color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: background 0.3s; }
        button:hover { background: #005a46; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="box">
        <h2>IFC Property Cleaner</h2>
        <p>Beholder kun egenskaper som starter med 0, 1, 2, 3, 4, 5, 6 eller 7.</p>
        <input type="file" id="file-input" accept=".ifc"><br><br>
        <button id="run-btn" onclick="runProcess()">Rensk fil</button>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="status">Klar til å starte</div>
    </div>

    <script type="module">
        import { IfcAPI } from 'https://cdn.jsdelivr.net/npm/web-ifc@0.0.44/web-ifc-api.js';
        
        window.runProcess = async function() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files.length) return alert("Velg en IFC-fil.");

            const statusDiv = document.getElementById('status');
            const progressBar = document.getElementById('progress-bar');
            const runBtn = document.getElementById('run-btn');

            runBtn.disabled = true;
            document.getElementById('progress-container').style.display = 'block';
            statusDiv.innerText = "Behandler...";
            progressBar.style.width = "20%";

            try {
                const file = fileInput.files[0];
                const buffer = await file.arrayBuffer();
                const ifcApi = new IfcAPI();
                ifcApi.SetWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.44/");
                await ifcApi.Init();
                
                const modelID = ifcApi.OpenModel(new Uint8Array(buffer));
                
                // Typer som skal renses (PropertySets og Quantities)
                const typesToClean = [855581566, 258838634]; 
                let removedCount = 0;

                typesToClean.forEach(type => {
                    const lines = ifcApi.GetLineIDsWithType(modelID, type);
                    for (let i = 0; i < lines.size(); i++) {
                        const id = lines.get(i);
                        const props = ifcApi.GetLine(modelID, id);
                        const name = props.Name ? props.Name.value : "";

                        // Hvis navnet IKKE starter med 0-7, slett
                        if (!/^[0-7]/.test(name)) {
                            ifcApi.RemoveLine(modelID, id);
                            removedCount++;
                        }
                    }
                });

                progressBar.style.width = "70%";
                statusDiv.innerText = "Lagrer...";

                const exportedData = ifcApi.SaveModel(modelID);
                const blob = new Blob([exportedData], { type: 'application/octet-stream' });
                
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Renset_" + file.name;
                a.click();

                ifcApi.CloseModel(modelID);
                statusDiv.innerText = "Ferdig! Fjernet " + removedCount + " grupper.";
                progressBar.style.width = "100%";
            } catch (err) {
                statusDiv.innerText = "Feil: " + err.message;
                console.error(err);
            } finally {
                runBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
